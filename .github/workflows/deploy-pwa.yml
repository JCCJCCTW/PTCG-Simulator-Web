name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [pwa]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare PWA files
        run: |
          mkdir -p _site
          cp index.html app.js styles.css manifest.json sw.js _site/
          cp -r assets _site/
          cp -r wallpapers _site/
          cp -r deck-builder-data _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
